<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Banner Animation — Preview</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',system-ui,sans-serif;
  background:#F4F4F7;display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;word-break:keep-all;
}
.preview-frame{
  width:100%;max-width:1200px;
  background:#F4F4F7;border-radius:10px;padding:20px 0;
}

.sa{
  --sa-bg:#F4F4F7;
  --sa-panel:#f2f2f2;
  --sa-border:rgba(0,0,0,.06);
  --sa-text:#191919;
  --sa-sub:#555555;
  --sa-light:#999999;
  --sa-accent:#2B5CFF;
  --sa-en:'Inter','Pretendard Variable',sans-serif;

  position:relative;
  background:var(--sa-bg);
  border-radius:10px;
  overflow:hidden;
  aspect-ratio:21/9;
  min-height:180px;
  user-select:none;
}

.sa-chat{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:260px;
  background:var(--sa-panel);
  border:1px solid var(--sa-border);
  border-radius:14px;
  padding:16px 18px;
  z-index:1;
  box-shadow:0 2px 16px rgba(0,0,0,.04);
}
.sa-chat-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid var(--sa-border);
}
.sa-chat-avatar{
  width:22px;height:22px;border-radius:6px;
  background:linear-gradient(135deg,var(--sa-accent),#6366F1);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;
  font-family:var(--sa-en);
}
.sa-chat-name{
  font-family:var(--sa-en);font-size:10.5px;font-weight:600;
  color:var(--sa-text);letter-spacing:-0.01em;
}
.sa-chat-online{
  width:5px;height:5px;border-radius:50%;
  background:#34D399;margin-left:auto;
}

.sa-messages{display:flex;flex-direction:column;gap:7px;min-height:72px}

.sa-msg{
  max-width:88%;padding:7px 11px;border-radius:10px;
  font-size:10.5px;line-height:1.55;
  opacity:0;transform:translateY(4px);
  transition:opacity .5s ease, transform .5s ease;
}
.sa-msg.vis{opacity:1;transform:translateY(0)}
.sa-msg--user{
  align-self:flex-end;
  background:var(--sa-text);color:#fff;
  border-bottom-right-radius:4px;
}
.sa-msg--bot{
  align-self:flex-start;
  background:var(--sa-bg);color:var(--sa-text);
  border-bottom-left-radius:4px;
}

.sa-typing{
  display:flex;gap:3px;padding:7px 11px;
  align-self:flex-start;
  background:var(--sa-bg);border-radius:10px;
  border-bottom-left-radius:4px;
  opacity:0;transition:opacity .4s ease;
}
.sa-typing.vis{opacity:1}
.sa-typing span{
  width:3.5px;height:3.5px;border-radius:50%;
  background:var(--sa-light);
  animation:sa-dot 1.2s ease-in-out infinite;
}
.sa-typing span:nth-child(2){animation-delay:.2s}
.sa-typing span:nth-child(3){animation-delay:.4s}
@keyframes sa-dot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:.8;transform:translateY(-2px)}}

.sa-cursor{
  position:absolute;
  top:0;left:0;
  z-index:10;
  opacity:0;
  pointer-events:none;
  will-change:transform,opacity;
  transition:
    opacity 1s ease-in-out,
    transform 2.2s cubic-bezier(.4,0,.2,1);
}

.sa-cursor-inner{
  animation:none;
  will-change:transform;
}
.sa-cursor.floating .sa-cursor-inner{
  animation:sa-float 6s ease-in-out infinite;
}
#cur0.floating .sa-cursor-inner{animation-duration:6s;animation-delay:0s}
#cur1.floating .sa-cursor-inner{animation-duration:7s;animation-delay:-.8s}
#cur2.floating .sa-cursor-inner{animation-duration:6.5s;animation-delay:-1.5s}
#cur3.floating .sa-cursor-inner{animation-duration:7.2s;animation-delay:-2.2s}
#cur4.floating .sa-cursor-inner{animation-duration:5.8s;animation-delay:-.4s}

@keyframes sa-float{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(2px,-4px)}
  66%{transform:translate(-2px,-2px)}
}

.sa-cursor-arrow{
  width:11px;height:15px;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.08));
}
.sa-cursor-label{
  position:absolute;top:13px;left:7px;
  font-family:var(--sa-en);font-size:8.5px;font-weight:600;
  color:#fff;padding:3px 8px 3px 7px;border-radius:4px;
  white-space:nowrap;letter-spacing:0.01em;
  box-shadow:0 1px 6px rgba(0,0,0,.1);
}

.sa-cursor--purple .sa-cursor-label{background:#7C3AED}
.sa-cursor--blue .sa-cursor-label{background:#2563EB}
.sa-cursor--green .sa-cursor-label{background:#059669}
.sa-cursor--orange .sa-cursor-label{background:#D97706}
.sa-cursor--pink .sa-cursor-label{background:#DB2777}

@media(max-width:834px){
  .sa{aspect-ratio:16/9;min-height:160px}
  .sa-chat{width:210px;padding:12px 14px}
  .sa-msg{font-size:9.5px;padding:6px 9px}
  .sa-cursor-label{font-size:7.5px;padding:2px 6px}
}
@media(max-width:480px){
  .sa{aspect-ratio:4/3;min-height:180px}
  .sa-chat{width:170px;padding:10px 12px}
}
</style>
</head>
<body>

<div class="preview-frame">
<div class="sa" id="studioAnim" aria-label="에이전틱 워크플로우 시각화">

  <div class="sa-chat">
    <div class="sa-chat-header">
      <div class="sa-chat-avatar">A</div>
      <span class="sa-chat-name">AWC Agent</span>
      <span class="sa-chat-online"></span>
    </div>
    <div class="sa-messages" id="saMessages"></div>
  </div>

  <div class="sa-cursor sa-cursor--purple" id="cur0"><div class="sa-cursor-inner"><svg class="sa-cursor-arrow" viewBox="0 0 12 16"><path d="M1 1l10 6.5L6.5 9l-2 6z" fill="#7C3AED" stroke="#fff" stroke-width=".6"/></svg><span class="sa-cursor-label">콘텐츠 마케터</span></div></div>
  <div class="sa-cursor sa-cursor--blue" id="cur1"><div class="sa-cursor-inner"><svg class="sa-cursor-arrow" viewBox="0 0 12 16"><path d="M1 1l10 6.5L6.5 9l-2 6z" fill="#2563EB" stroke="#fff" stroke-width=".6"/></svg><span class="sa-cursor-label">CS 담당자</span></div></div>
  <div class="sa-cursor sa-cursor--green" id="cur2"><div class="sa-cursor-inner"><svg class="sa-cursor-arrow" viewBox="0 0 12 16"><path d="M1 1l10 6.5L6.5 9l-2 6z" fill="#059669" stroke="#fff" stroke-width=".6"/></svg><span class="sa-cursor-label">데이터 분석가</span></div></div>
  <div class="sa-cursor sa-cursor--orange" id="cur3"><div class="sa-cursor-inner"><svg class="sa-cursor-arrow" viewBox="0 0 12 16"><path d="M1 1l10 6.5L6.5 9l-2 6z" fill="#D97706" stroke="#fff" stroke-width=".6"/></svg><span class="sa-cursor-label">일정 관리자</span></div></div>
  <div class="sa-cursor sa-cursor--pink" id="cur4"><div class="sa-cursor-inner"><svg class="sa-cursor-arrow" viewBox="0 0 12 16"><path d="M1 1l10 6.5L6.5 9l-2 6z" fill="#DB2777" stroke="#fff" stroke-width=".6"/></svg><span class="sa-cursor-label">디자이너</span></div></div>

</div>
</div>

<script>
const SA = document.getElementById('studioAnim');
const cursors = [0,1,2,3,4].map(i => document.getElementById('cur'+i));
const msgBox = document.getElementById('saMessages');

function sleep(ms){ return new Promise(r => setTimeout(r, ms)) }
function pct(xPct, yPct){
  const r = SA.getBoundingClientRect();
  return { x: r.width * xPct / 100, y: r.height * yPct / 100 };
}
function moveCursor(idx, xPct, yPct){
  const {x, y} = pct(xPct, yPct);
  cursors[idx].style.transform = `translate(${x}px, ${y}px)`;
}
function placeCursor(idx, xPct, yPct){
  cursors[idx].style.transition = 'opacity 1s ease-in-out';
  moveCursor(idx, xPct, yPct);
}
function glideCursor(idx, xPct, yPct){
  cursors[idx].style.transition = 'opacity 1s ease-in-out, transform 2.2s cubic-bezier(.4,0,.2,1)';
  moveCursor(idx, xPct, yPct);
}
function showCursor(idx){ cursors[idx].style.opacity='1'; cursors[idx].classList.add('floating') }
function hideCursor(idx){
  cursors[idx].style.opacity='0';
  setTimeout(() => cursors[idx].classList.remove('floating'), 1200);
}
function hideAll(){ cursors.forEach((_,i) => { hideCursor(i); placeCursor(i,-10,-10) }) }

function createMsg(text, type){
  const d = document.createElement('div');
  d.className = 'sa-msg sa-msg--' + type;
  d.textContent = text;
  msgBox.appendChild(d);
  requestAnimationFrame(() => requestAnimationFrame(() => d.classList.add('vis')));
  return d;
}
function createTyping(){
  const d = document.createElement('div');
  d.className = 'sa-typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  msgBox.appendChild(d);
  requestAnimationFrame(() => requestAnimationFrame(() => d.classList.add('vis')));
  return d;
}
function fadeOutMsg(el){
  if(!el) return;
  el.style.transition = 'opacity .6s ease-in-out';
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 600);
}

const scenarios = [
  {
    userMsg: '이번 주 콘텐츠 기획해줘',
    botMsg: '5건 초안 완료, 일정 등록됨 ✓',
    agents: [0, 2, 3],
    startPos: [[8,-8],[105,10],[105,80]],
    workPos:  [[12,20],[72,18],[74,68]]
  },
  {
    userMsg: '고객 문의 3건 정리해줘',
    botMsg: '3건 분류 완료, 긴급 1건 알림 ✓',
    agents: [1, 2],
    startPos: [[-8,85],[80,-8]],
    workPos:  [[14,58],[76,22]]
  },
  {
    userMsg: '포트폴리오 페이지 업데이트해',
    botMsg: '디자인 반영, 배포 완료 ✓',
    agents: [4, 0, 3],
    startPos: [[108,45],[-8,15],[60,108]],
    workPos:  [[74,38],[14,22],[68,70]]
  },
  {
    userMsg: '이번 달 성과 리포트 만들어줘',
    botMsg: '데이터 수집 → 시각화 → 문서 완료 ✓',
    agents: [2, 0, 4],
    startPos: [[70,-8],[-8,45],[85,108]],
    workPos:  [[76,20],[10,24],[72,60]]
  }
];

let idx = 0;

async function runScenario(s){
  s.agents.forEach((ai, i) => placeCursor(ai, s.startPos[i][0], s.startPos[i][1]));
  await sleep(50);

  const userMsg = createMsg(s.userMsg, 'user');
  await sleep(700);

  for(let i = 0; i < s.agents.length; i++){
    glideCursor(s.agents[i], s.workPos[i][0], s.workPos[i][1]);
    showCursor(s.agents[i]);
    await sleep(350);
  }
  await sleep(1200);

  const typing = createTyping();
  for(let d = 0; d < 2; d++){
    await sleep(1400);
    s.agents.forEach((ai, i) => {
      glideCursor(ai, s.workPos[i][0]+(Math.random()*4-2), s.workPos[i][1]+(Math.random()*4-2));
    });
  }

  fadeOutMsg(typing);
  await sleep(300);
  const botMsg = createMsg(s.botMsg, 'bot');
  await sleep(2500);

  s.agents.forEach((ai, i) => {
    setTimeout(() => { cursors[ai].style.transition='opacity 1.2s ease-in-out'; hideCursor(ai) }, i*200);
  });
  await sleep(1500);

  fadeOutMsg(userMsg);
  fadeOutMsg(botMsg);
  await sleep(800);
}

async function loop(){
  hideAll();
  await sleep(500);
  while(true){
    await runScenario(scenarios[idx]);
    idx = (idx + 1) % scenarios.length;
    await sleep(300);
  }
}

loop();
</script>
</body>
</html>
