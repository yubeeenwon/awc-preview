<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f2f2f2">
<meta name="description" content="AWC 실전 사례 — 에이전틱 워크플로우로 업무 방식을 바꾼 기업들의 기록.">
<title>AWC — 실전 사례</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="common.css">
<style>
/* nav-item active state (cases-specific) */
.nav-item.--active{font-weight:var(--w-bold);color:var(--c-text);background:none}

/* ═══ SEARCH & FILTER ═══ */
.search-bar{max-width:700px;margin:0 auto 20px;position:relative}
.search-input{width:100%;padding:14px 20px 14px 48px;font-size:.82rem;font-family:var(--f-kr);border:1px solid var(--c-bg2);border-radius:12px;background:var(--c-bg2);color:var(--c-text);outline:none;transition:border-color .2s,box-shadow .2s}
.search-input:focus{border-color:var(--c-accent);box-shadow:0 0 0 3px rgba(43,92,255,.08)}
.search-input::placeholder{color:var(--c-light)}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--c-light);pointer-events:none}

.filter-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:48px}
.filter-btn{font-size:.7rem;font-weight:600;padding:8px 20px;border-radius:40px;color:var(--c-sub);border:1px solid var(--c-bg2);transition:all .2s}
.filter-btn:hover{border-color:var(--c-sub);color:var(--c-text)}
.filter-btn.--active{background:var(--c-text);color:var(--c-white);border-color:var(--c-text)}

/* ═══ CASE GRID ═══ */
.case-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:80px}
.case-card{position:relative;border-radius:var(--r-sm);overflow:hidden;background:var(--c-bg2);aspect-ratio:3/4;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .25s,box-shadow .25s;text-decoration:none;color:var(--c-text)}
.case-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.case-card-img{position:absolute;inset:0;background-size:cover;background-position:center}
.case-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.05) 50%,transparent 100%)}
.case-card-body{position:relative;z-index:2;padding:28px}
.case-card-tag{font-family:var(--f-en);font-size:.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:8px}
.case-card-title{font-size:.95rem;font-weight:800;color:var(--c-bg2);line-height:1.4;margin-bottom:8px}
.case-card-stat{font-size:.72rem;color:rgba(255,255,255,.6)}
.case-card.--placeholder{background:var(--c-bg2);justify-content:center;align-items:center;text-align:center}
.case-card.--placeholder .case-card-body{padding:36px}
.case-card.--placeholder .case-card-tag{color:var(--c-accent)}
.case-card.--placeholder .case-card-title{color:var(--c-text);font-size:.88rem}
.case-card.--placeholder .case-card-stat{color:var(--c-light)}

/* ═══ EMPTY STATE ═══ */
.empty-state{display:none;text-align:center;padding:80px 20px}
.empty-state.--show{display:block}
.empty-icon{width:48px;height:48px;background:var(--c-bg2);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--c-light)}
.empty-title{font-size:.95rem;font-weight:700;margin-bottom:8px}
.empty-desc{font-size:.78rem;color:var(--c-sub);margin-bottom:24px}

/* ═══ CTA BANNER ═══ */
.cta{padding:clamp(60px,8vw,100px) 0}
.cta-block{background:#4A6CF7;border-radius:var(--r-lg);padding:clamp(40px,5vw,72px) clamp(32px,4vw,64px);display:flex;justify-content:space-between;align-items:center;color:var(--c-white);gap:40px;flex-wrap:wrap;position:relative;overflow:hidden}
.cta-block::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);pointer-events:none}
.cta-title{font-size:clamp(1.1rem,2vw,1.4rem);font-weight:var(--w-bold);line-height:1.4;letter-spacing:-0.02em;margin-bottom:10px;text-wrap:balance}
.cta-sub{font-size:var(--t-sm);color:rgba(255,255,255,.65);font-weight:var(--w-regular);letter-spacing:-0.01em}
.cta-btns{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}

/* footer → common.css */

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .case-grid{grid-template-columns:1fr 1fr}
  .cta-block{flex-direction:column;align-items:flex-start;padding:48px 32px}
}
@media(max-width:600px){
  .wrap{padding:0 20px}
  .case-grid{grid-template-columns:1fr}
  .case-card{aspect-ratio:3/4}
  .nav-item{font-size:.65rem;padding:8px 14px}
  .footer-inner{flex-direction:column;gap:12px;text-align:center}
  .footer-links{justify-content:center}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" aria-label="Main navigation">
  <a href="index.html" class="nav-logo-mobile">AWC</a>
  <div class="nav-pill">
    <a class="nav-item nav-logo" href="index.html">AWC</a>
    <a class="nav-item --active" href="cases.html">Cases</a>
    <a class="nav-item" href="index.html#workflow">Workflow</a>
    <button class="nav-item nav-cta" onclick="location.href='mailto:bruce@intellieffect.com'" type="button">Contact <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 14.5 9.5"/><path d="M17 7v7"/><path d="M17 7h-7"/></svg></button>
  </div>
  <button class="nav-burger" id="navBurger" type="button" aria-label="메뉴 열기" onclick="toggleMobileMenu()">
    <svg class="burger-open" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
    <svg class="burger-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6l-5.5 5.5"/><path d="M6 18l5.5-5.5"/><path d="M6 6l5.5 5.5"/><path d="M18 18l-5.5-5.5"/></svg>
  </button>
</nav>
<div class="nav-backdrop" id="navBackdrop" onclick="closeMobileMenu()"></div>
<div class="nav-overlay" id="navOverlay">
  <a href="cases.html" class="nav-overlay-item" onclick="closeMobileMenu()">Cases</a>
  <a href="index.html#workflow" class="nav-overlay-item" onclick="closeMobileMenu()">Workflow</a>
  <button class="nav-overlay-cta" onclick="closeMobileMenu();location.href='mailto:bruce@intellieffect.com'" type="button">Contact <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 14.5 9.5"/><path d="M17 7v7"/><path d="M17 7h-7"/></svg></button>
</div>

<main>
<!-- PAGE HERO -->
<section class="page-hero">
  <div class="wrap">
    <p class="page-label">Cases</p>
    <h1 class="page-title">실전 사례 아카이브</h1>
    <p class="page-sub">이론이 아닌 결과. Agent를 업무에 투입한 실제 기록.</p>
  </div>
</section>

<!-- SEARCH & FILTER -->
<section class="wrap">
  <div class="search-bar">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="업종, 키워드로 사례 검색… (예: 교육, 마케팅, 이커머스)">
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn --active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="education">Education</button>
    <button class="filter-btn" data-filter="sports">Sports</button>
    <button class="filter-btn" data-filter="food">Food</button>
    <button class="filter-btn" data-filter="marketing">Marketing</button>
    <button class="filter-btn" data-filter="ecommerce">E-commerce</button>
    <button class="filter-btn" data-filter="healthcare">Healthcare</button>
  </div>
</section>

<!-- CASE GRID -->
<section class="wrap">
  <div class="case-grid" id="caseGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <p class="empty-title">검색 결과가 없습니다</p>
    <p class="empty-desc">다른 키워드로 검색하거나, 필터를 변경해 보세요.</p>
    <button class="btn btn--primary" onclick="resetSearch()">전체 보기</button>
  </div>
</section>

<!-- CTA -->
<section class="cta" aria-label="도입 문의">
  <div class="wrap">
    <div class="cta-block">
      <div>
        <h2 class="cta-title">우리 업무에도 Agent를 투입할 수 있을까?</h2>
        <p class="cta-sub">현재 업무 흐름을 듣고, 어디에 Agent가 들어갈 수 있는지 함께 살펴봅니다.</p>
      </div>
      <div class="cta-btns">
        <a href="mailto:bruce@intellieffect.com?subject=에이전틱 워크플로우 도입 문의" class="btn btn--white">Contact <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 14.5 9.5"/><path d="M17 7v7"/><path d="M17 7h-7"/></svg></a>
      </div>
    </div>
  </div>
</section>
</main>

<!-- FOOTER -->
<footer class="footer"><div class="wrap"><div class="footer-inner"><span>© 2026 AWC · Bruce Choe · IntelliEffect</span><nav class="footer-links" aria-label="Footer links"><a href="https://intellieffect.com" target="_blank" rel="noopener">IntelliEffect</a><a href="https://open.kakao.com/o/ssTP6Omi" target="_blank" rel="noopener">Community</a><a href="https://brxce.ai" target="_blank" rel="noopener">brxce.ai</a></nav></div></div></footer>

<script>
// ═══ CASE DATA ═══
const cases = [
  {
    id: 'piano',
    category: 'education',
    tags: ['교육', '피아노', '콘텐츠', 'SNS', '마케팅', '키즈'],
    title: 'AI 에이전트가 운영하는 피아노 교육',
    stat: '팔로워 1,282명 · 레슨 신청 22명',
    thumb: 'case-piano-thumb.jpg',
    link: 'case-piano.html'
  },
  {
    id: 'sports',
    category: 'sports',
    tags: ['스포츠', '테크', '운동', '피트니스', '데이터'],
    title: '준비 중',
    stat: '',
    thumb: 'case-sports-thumb.jpg',
    link: 'case-sports.html'
  },
  {
    id: 'food',
    category: 'food',
    tags: ['식품', '요식업', 'F&B', '레스토랑', '푸드'],
    title: '준비 중',
    stat: '',
    thumb: null,
    link: null
  }
];

// ═══ RENDER ═══
const grid = document.getElementById('caseGrid');
const empty = document.getElementById('emptyState');
let activeFilter = 'all';
let searchQuery = '';

function renderCases() {
  let filtered = cases;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(c => c.category === activeFilter);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(c =>
      c.title.toLowerCase().includes(q) ||
      c.category.toLowerCase().includes(q) ||
      c.tags.some(t => t.toLowerCase().includes(q))
    );
  }

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.add('--show');
    return;
  }

  empty.classList.remove('--show');
  grid.innerHTML = filtered.map(c => {
    if (!c.thumb) {
      return `
        <div class="case-card --placeholder">
          <div class="case-card-body">
            <p class="case-card-tag">${c.category}</p>
            <h3 class="case-card-title">${c.title}</h3>
            ${c.stat ? `<p class="case-card-stat">${c.stat}</p>` : ''}
          </div>
        </div>`;
    }
    const tag = c.link ? 'a' : 'div';
    const href = c.link ? ` href="${c.link}"` : '';
    return `
      <${tag}${href} class="case-card">
        <div class="case-card-img" style="background-image:url('${c.thumb}')"></div>
        <div class="case-card-overlay"></div>
        <div class="case-card-body">
          <p class="case-card-tag">${c.category}</p>
          <h3 class="case-card-title">${c.title}</h3>
          ${c.stat ? `<p class="case-card-stat">${c.stat}</p>` : ''}
        </div>
      </${tag}>`;
  }).join('');
}

// ═══ FILTER ═══
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('--active'));
  btn.classList.add('--active');
  activeFilter = btn.dataset.filter;
  renderCases();
});

// ═══ SEARCH ═══
let debounce;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => {
    searchQuery = e.target.value.trim();
    // 검색 시 필터 전체로 리셋
    if (searchQuery) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('--active'));
      document.querySelector('[data-filter="all"]').classList.add('--active');
      activeFilter = 'all';
    }
    renderCases();
  }, 250);
});

function resetSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('--active'));
  document.querySelector('[data-filter="all"]').classList.add('--active');
  renderCases();
}

// ═══ INIT ═══
renderCases();

// Mobile menu
function toggleMobileMenu(){const b=document.getElementById('navBurger'),o=document.getElementById('navOverlay'),d=document.getElementById('navBackdrop');const isOpen=b.classList.toggle('open');o.classList.toggle('open',isOpen);d.classList.toggle('open',isOpen);}
function closeMobileMenu(){const b=document.getElementById('navBurger'),o=document.getElementById('navOverlay'),d=document.getElementById('navBackdrop');b.classList.remove('open');o.classList.remove('open');d.classList.remove('open');}
</script>
</body>
</html>
